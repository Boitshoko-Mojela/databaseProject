<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #f0f2f5, #ffffff);
        }

        /* Welcome Banner */
        #banner {
            width: 100%;
            background: #2ecc71;
            color: white;
            padding: 20px 0;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
        }

        /* Customer Profile */
        #customer-profile {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #ffffff;
            padding: 12px 18px;
            border-radius: 40px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            z-index: 1000;
        }

        #customer-profile img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 10px;
            border: 2px solid #3498db;
        }

        #customer-profile span {
            font-weight: 600;
            color: #333;
        }

        h1 {
            text-align: center;
            padding-top: 160px;
            font-size: 2.5rem;
            color: #2c3e50;
        }

        #product-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            padding: 40px 60px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .product:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .product h3 {
            margin: 15px 0 10px;
            font-size: 1.2rem;
            color: #333;
        }

        .product p {
            color: #555;
            margin-bottom: 15px;
        }

        .product button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .product button:hover {
            background-color: #2980b9;
        }

        @media screen and (max-width: 600px) {
            #customer-profile {
                top: 80px;
                right: 10px;
                padding: 8px 12px;
            }

            #customer-profile img {
                width: 30px;
                height: 30px;
            }

            #product-list {
                padding: 20px;
            }

            h1 {
                font-size: 2rem;
                padding-top: 140px;
            }

            #banner {
                font-size: 1.2rem;
                padding: 15px 0;
            }
        }
    </style>
</head>
<body>

<!-- Top Welcome Banner -->
<div id="banner">👋 Welcome to the Group1 Online Store!</div>

<!-- Customer Profile Display -->
<div id="customer-profile">
    <img src="https://www.svgrepo.com/show/382106/profile-user.svg" alt="Profile Icon">
    <span id="customer-name">Loading...</span>
</div>

<!-- Page Title -->
<h1>Explore Our Products</h1>

<!-- Product Cards -->
<div id="product-list"></div>

<!-- JavaScript to fetch and render data -->
<script>
    // Load customer info
    fetch('http://localhost:3000/customer')
        .then(response => response.json())
        .then(data => {
            document.getElementById('customer-name').textContent = data.Customer_Name;
        })
        .catch(error => {
            console.error('Error fetching customer:', error);
            document.getElementById('customer-name').textContent = 'Guest';
        });

    // Load products
    fetch('http://localhost:3000/products')
        .then(response => response.json())
        .then(products => {
            const list = document.getElementById('product-list');
            products.forEach(product => {
                const item = document.createElement('div');
                item.className = 'product';
                item.innerHTML = `
                        <h3>${product.Product_Name}</h3>
                        <p>Price: $${product.Product_Cost}</p>
                        <button>Add to Cart</button>
                    `;
                list.appendChild(item);
            });
        })
        .catch(error => {
            console.error('Error fetching products:', error);
        });
</script>

</body>
</html>
